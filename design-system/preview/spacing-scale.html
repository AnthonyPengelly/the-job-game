<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display:flex; align-items:flex-end; gap: var(--space-4); }
  .unit { display:flex; flex-direction:column; align-items:center; gap:var(--space-2); }
  .bar { width:26px; background:var(--accent); border-radius:var(--radius-xs); opacity:.85; }
</style></head>
<body><div class="card">
  <span class="t-label">Spacing · 4px base grid</span>
  <div class="scale">
    <div class="unit"><div class="bar" style="height:4px"></div><div class="cap">1<br>4</div></div>
    <div class="unit"><div class="bar" style="height:8px"></div><div class="cap">2<br>8</div></div>
    <div class="unit"><div class="bar" style="height:12px"></div><div class="cap">3<br>12</div></div>
    <div class="unit"><div class="bar" style="height:16px"></div><div class="cap">4<br>16</div></div>
    <div class="unit"><div class="bar" style="height:24px"></div><div class="cap">5<br>24</div></div>
    <div class="unit"><div class="bar" style="height:32px"></div><div class="cap">6<br>32</div></div>
    <div class="unit"><div class="bar" style="height:48px"></div><div class="cap">7<br>48</div></div>
    <div class="unit"><div class="bar" style="height:64px"></div><div class="cap">8<br>64</div></div>
    <div class="unit"><div class="bar" style="height:96px"></div><div class="cap">9<br>96</div></div>
  </div>
</div></body></html>
