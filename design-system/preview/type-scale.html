<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display:flex; flex-direction:column; gap: var(--space-2); }
  .lin { display:flex; align-items:baseline; gap: var(--space-4); }
  .lin .tok { font-family:var(--font-data); font-size:11px; color:var(--fg-faint); width:120px; flex:none; }
  .lin .ex { font-family:var(--font-display); color:var(--fg); line-height:1; white-space:nowrap; }
</style></head>
<body><div class="card">
  <span class="t-label">Type scale · arm's-length minimums</span>
  <div class="scale">
    <div class="lin"><span class="tok">4xl · 84</span><span class="ex" style="font-size:54px">Getaway 0:45</span></div>
    <div class="lin"><span class="tok">2xl · 46</span><span class="ex" style="font-size:40px">Phase Title</span></div>
    <div class="lin"><span class="tok">xl · 34</span><span class="ex" style="font-size:30px">Section Header</span></div>
    <div class="lin"><span class="tok">lg · 26</span><span class="ex" style="font-size:24px">Card Heading</span></div>
    <div class="lin"><span class="tok">base · 18</span><span class="ex" style="font-family:var(--font-body);font-size:18px">Body — minimum comfortable</span></div>
    <div class="lin"><span class="tok">xs · 13</span><span class="ex" style="font-family:var(--font-data);font-size:13px;letter-spacing:.12em">HUD LABEL</span></div>
  </div>
</div></body></html>
