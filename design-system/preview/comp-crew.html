<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .crew { display:flex; gap:var(--space-3); }
  .member {
    width:140px; background:var(--bg-panel); border:1px solid var(--border);
    border-radius:var(--radius-md); padding:12px; display:flex; flex-direction:column; gap:10px;
  }
  .member.down { opacity:.5; }
  .av { width:34px; height:34px; border-radius:var(--radius-sm); background:var(--c-surface-3); border:1px solid var(--border-strong); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; color:var(--accent); }
  .nm { font-family:var(--font-display); font-weight:600; text-transform:uppercase; font-size:16px; letter-spacing:.02em; line-height:1; }
  .role { font-family:var(--font-data); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-faint); }
  .gear { font-family:var(--font-data); font-size:11px; color:var(--data); background:var(--data-tint); border:1px solid var(--c-cyan-500); border-radius:var(--radius-xs); padding:3px 7px; align-self:flex-start; }
</style></head>
<body><div class="card">
  <div class="crew">
    <div class="member">
      <div class="row" style="gap:8px"><span class="av">R</span><div class="col" style="gap:3px"><span class="nm">Reno</span><span class="role">Driver</span></div></div>
      <span class="gear">⬡ SMOKE RIG</span>
    </div>
    <div class="member">
      <div class="row" style="gap:8px"><span class="av">V</span><div class="col" style="gap:3px"><span class="nm">Vesper</span><span class="role">Hacker</span></div></div>
      <span class="gear">⬡ SPIKE</span>
    </div>
    <div class="member down">
      <div class="row" style="gap:8px"><span class="av" style="color:var(--fg-faint)">M</span><div class="col" style="gap:3px"><span class="nm">Marlow</span><span class="role">Out</span></div></div>
      <span class="gear" style="color:var(--fg-faint);background:var(--c-surface-2);border-color:var(--border)">—</span>
    </div>
  </div>
  <div class="cap" style="color:var(--fg-faint)">Crew cards: avatar initial, codename, role, assigned gear. Dimmed = out of play.</div>
</div></body></html>
