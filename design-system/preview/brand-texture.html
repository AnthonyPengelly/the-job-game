<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display:flex; gap:var(--space-4); }
  .bgsw { width:200px; height:110px; border-radius:var(--radius-md); border:1px solid var(--border); position:relative; overflow:hidden; display:flex; align-items:flex-end; padding:10px; }
  .bgsw .nm { font-family:var(--font-data); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-2); position:relative; z-index:2; }
  /* grain */
  .grain::after { content:""; position:absolute; inset:0; opacity:.5; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>"); }
  .grain { background:radial-gradient(120% 100% at 50% 0%, #16201f, var(--c-void)); }
  /* scanlines */
  .scan { background:var(--c-base); }
  .scan::after { content:""; position:absolute; inset:0; opacity:.5;
    background:repeating-linear-gradient(0deg, rgba(31,208,110,.06) 0 1px, transparent 1px 3px); }
  /* vignette clean */
  .vig { background:radial-gradient(130% 110% at 50% -10%, #1a2422, var(--c-void) 70%); }
</style></head>
<body><div class="card">
  <span class="t-label">Surface treatments</span>
  <div class="swatches">
    <div class="bgsw vig"><span class="nm">clean · default</span></div>
    <div class="bgsw grain"><span class="nm">film grain · opt-in</span></div>
    <div class="bgsw scan"><span class="nm">scanlines · hacker</span></div>
  </div>
  <div class="cap" style="color:var(--fg-faint)">Clean by default — a warm radial vignette only. Film grain and scanlines are opt-in overlays. Never enough to hurt legibility.</div>
</div></body></html>
