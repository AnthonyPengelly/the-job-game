<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row" style="justify-content:space-between">
    <span class="t-label">Data / HUD · JetBrains Mono</span>
    <span class="cap">800 / 700 / 500 · tabular-nums</span>
  </div>
  <div class="row" style="gap:var(--space-6); align-items:baseline">
    <span class="t-data-hero" style="color:var(--accent)">12<span style="color:var(--fg-faint);font-size:38px">/20</span></span>
    <div class="col" style="gap:4px">
      <span class="t-label">HEAT</span>
      <span class="t-data" style="color:var(--danger)">RISING</span>
    </div>
    <div class="col" style="gap:4px">
      <span class="t-label">LOOT</span>
      <span class="t-data">$ 48,500</span>
    </div>
  </div>
  <div class="cap" style="color:var(--fg-faint)">Every number, counter, ID, label and timer. Tabular figures keep counters from jittering.</div>
</div></body></html>
