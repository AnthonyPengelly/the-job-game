<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .btn {
    font-family: var(--font-display); font-weight:700; text-transform:uppercase;
    letter-spacing: var(--track-wide); font-size:18px;
    padding: 12px 22px; border-radius: var(--radius-md); border:1px solid transparent;
    cursor:pointer; display:inline-flex; align-items:center; gap:8px; line-height:1;
  }
  .btn-primary { background:var(--accent); color:var(--fg-on-accent); box-shadow:var(--elev-1); }
  .btn-primary.hover { background:var(--accent-hover); box-shadow:var(--glow-accent); }
  .btn-secondary { background:var(--c-surface-3); color:var(--fg); border-color:var(--border-strong); }
  .btn-secondary.hover { background:var(--c-surface-4); }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-danger.hover { background:var(--danger-hover); box-shadow:var(--glow-heat); }
  .btn-ghost { background:transparent; color:var(--fg-muted); border-color:var(--border); }
  .btn[disabled] { opacity:.4; }
  .lbl { font-family:var(--font-data); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--fg-faint); }
  .grp { display:flex; flex-direction:column; gap:8px; align-items:flex-start; }
</style></head>
<body><div class="card">
  <div class="row" style="gap:var(--space-5); align-items:flex-start">
    <div class="grp"><span class="lbl">default</span>
      <button class="btn btn-primary">Begin Heist</button></div>
    <div class="grp"><span class="lbl">hover</span>
      <button class="btn btn-primary hover">Begin Heist</button></div>
    <div class="grp"><span class="lbl">disabled</span>
      <button class="btn btn-primary" disabled>Begin Heist</button></div>
  </div>
  <div class="row" style="gap:var(--space-3)">
    <button class="btn btn-secondary">Skip</button>
    <button class="btn btn-danger">Raise Heat</button>
    <button class="btn btn-ghost">Cancel</button>
  </div>
</div></body></html>
