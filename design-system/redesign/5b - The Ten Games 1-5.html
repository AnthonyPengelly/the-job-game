<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Job · 05 The Ten Games 1–5</title>
<link rel="stylesheet" href="assets/colors_and_type.css">
<link rel="stylesheet" href="assets/the-job.css">
<link rel="stylesheet" href="assets/minigame.css">
<style>
  .mg-section{ margin:78px 0 -18px; border-top:1px solid var(--border-strong); padding-top:30px; }
  .mg-section h2{ font-family:var(--font-display); font-weight:800; text-transform:uppercase; font-size:40px; letter-spacing:-.01em; color:var(--fg); }
  .mg-section h2 .gr{ color:var(--accent); }
  .mg-section p{ font-family:var(--font-body); font-size:17px; line-height:1.5; color:var(--fg-muted); max-width:80ch; margin-top:10px; }
  /* beat dots */
  .beatrow{ display:flex; gap:7px; }
  .bdot{ width:18px; height:18px; border-radius:50%; background:var(--c-surface-3); border:1px solid var(--border-strong); }
  .bdot.done{ background:var(--c-surface-4); }
  .bdot.on{ background:var(--accent); border-color:var(--c-green-400); box-shadow:var(--glow-accent); }
  .bdot.mute{ background:transparent; border-style:dashed; }
  .bdot.target{ border-color:var(--caution); }
  .feedback{ font-family:var(--font-display); font-weight:800; text-transform:uppercase; font-size:64px; letter-spacing:-.01em; line-height:1; }
  .feedback.hit{ color:var(--accent); } .feedback.early{ color:var(--caution); } .feedback.late{ color:var(--danger); }
  .tally{ display:flex; align-items:center; gap:18px; }
  .tally .tcount{ font-family:var(--font-data); font-weight:800; font-size:64px; line-height:1; color:var(--fg); font-variant-numeric:tabular-nums; }
  .tally .tbtn{ display:flex; flex-direction:column; align-items:center; gap:4px; padding:16px 26px; border:1px solid var(--c-green-700); border-radius:var(--radius-md); background:var(--accent-tint); cursor:pointer; }
  .tally .tbtn .tl{ font-family:var(--font-display); font-weight:800; text-transform:uppercase; font-size:24px; color:var(--accent); }
  .tally .tbtn .ts{ font-family:var(--font-data); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--fg-faint); }
  .spread{ display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
  .qa{ display:flex; flex-direction:column; gap:14px; width:100%; max-width:660px; }
  .qa .q{ font-family:var(--font-body); font-weight:600; font-size:26px; line-height:1.3; color:var(--fg); }
  .qa .ans{ display:flex; align-items:center; gap:10px; padding:11px 15px; border:1px dashed var(--c-cyan-500); border-radius:var(--radius-md); background:var(--data-tint); }
  .qa .ans svg{ width:16px; height:16px; color:var(--data); }
  .qa .ans .al{ font-family:var(--font-data); font-weight:700; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--data); }
  .qa .ans .av{ font-family:var(--font-body); font-weight:600; font-size:19px; color:var(--c-cyan-300); }
  .opts4{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .opt4{ display:flex; align-items:center; gap:11px; padding:12px 15px; border:1px solid var(--border-strong); border-radius:var(--radius-md); background:var(--c-surface-2); }
  .opt4 .ol{ width:26px; height:26px; flex:none; border-radius:var(--radius-xs); background:var(--c-surface-3); display:flex; align-items:center; justify-content:center; font-family:var(--font-data); font-weight:800; color:var(--fg-muted); }
  .opt4 .ot{ font-family:var(--font-body); font-size:17px; color:var(--fg); }
  .opt4.correct{ border-color:var(--c-cyan-500); background:var(--data-tint); }
  .opt4.correct .ol{ background:var(--data); color:var(--c-fg-ink); }
  .opt4.correct .ot{ color:var(--c-cyan-300); }
  .judge{ display:flex; gap:10px; }
  .tower{ display:flex; flex-direction:column-reverse; gap:4px; align-items:center; }
  .tower .brick{ width:120px; height:18px; border-radius:2px; background:linear-gradient(180deg,var(--c-surface-4),var(--c-surface-3)); border:1px solid var(--border-strong); }
  .tower .brick.target{ border-color:var(--caution); border-style:dashed; background:transparent; }
  .burst{ display:flex; align-items:center; gap:10px; padding:8px 14px; border:1px solid var(--c-amber-700); border-radius:var(--radius-md); background:var(--caution-tint); }
  .burst svg{ width:17px; height:17px; color:var(--caution); }
  .burst .bk{ font-family:var(--font-data); font-weight:700; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--caution); }
  .burst .bv{ font-family:var(--font-data); font-weight:800; font-size:24px; color:var(--c-amber-300); font-variant-numeric:tabular-nums; }
  .rulebook{ display:flex; flex-direction:column; gap:8px; padding:14px 16px; border:1px solid var(--border); border-radius:var(--radius-md); background:var(--c-surface-1); max-width:300px; }
  .rulebook .rh{ font-family:var(--font-data); font-weight:700; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-faint); display:flex; align-items:center; gap:7px; }
  .rulebook .rh svg{ width:14px; height:14px; }
  .rulebook .rl{ display:flex; align-items:center; gap:9px; font-family:var(--font-body); font-size:15px; color:var(--fg-muted); }
  .rulebook .rl .sw{ width:12px; height:12px; border-radius:50%; flex:none; }
  .defuse-2col{ display:flex; gap:24px; align-items:center; justify-content:center; }
</style>
</head>
<body>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="assets/cockpit.js"></script>
<script src="assets/minigame.js"></script>
<script>
  TJ.page({
    num: '05', eyebrow: 'Screen 05 · The Mini-games',
    title: 'The Ten Games · 1–5',
    desc: 'Each of the ten obstacle resolvers in its ACTIVE state, sitting in the universal shell (see 05a–c). State is colour and iconography, never prose; progress is always a meter; boosts surface only for the committed holder and fire once. ARMED and RESOLVE reuse the shell. The lane(s) tested are highlighted cyan on the in-play crew.',
    crumbs: [
      { label: '04 Scenario', href: '4 - Scenario Room.html' },
      { label: '05 Shell', href: '5 - Mini-games.html' },
      { label: '05 The Ten · 1–5', href: '5b - The Ten Games 1-5.html', here: true },
      { label: '05 The Ten · 6–10', href: '5c - The Ten Games 6-10.html' },
      { label: '06 Spoils', href: '6 - Spoils.html' },
      { label: 'Index', href: 'index.html' }
    ]
  });

  function section(t, s) {
    var d = document.createElement('div'); d.className = 'mg-section';
    d.innerHTML = '<h2>' + t + '</h2>' + (s ? '<p>' + s + '</p>' : '');
    window.__TJ_G.appendChild(d);
  }

  /* crew helper: committed -> in-play (lane highlighted), resting -> rest, else watch */
  var POWER = { Lucy: 'tec', Millie: 'cha', George: 'phy', Liv: 'ste', Chris: null };
  function crew(committed, resting, lanes) {
    return ['Lucy', 'Millie', 'George', 'Liv', 'Chris'].map(function (n) {
      var c = { name: n, powers: POWER[n] ? [POWER[n]] : [], gear: (n === 'Lucy' || n === 'Liv') };
      if (committed.indexOf(n) >= 0) { c.state = 'in'; c.stateLabel = 'IN PLAY'; c.hotLanes = lanes || []; }
      else if ((resting || []).indexOf(n) >= 0) { c.state = 'rest'; c.stateLabel = 'RESTS'; }
      else { c.state = 'idle'; c.stateLabel = 'WATCH'; }
      return c;
    });
  }
  function base(extra) {
    return Object.assign({
      heat: 9, loot: 5600, round: '4', totalRounds: '6', kind: 'OBSTACLE',
      phaseNum: '05', phaseLabel: 'Obstacle', tools: { gearBadge: 0 }, crewModeLabel: 'Committed'
    }, extra);
  }
  function dots(n, on) { var s = ''; for (var i = 0; i < 16; i++) { var c = 'bdot'; if (i < on - 1) c += ' done'; if (i === on - 1) c += ' on'; if (i === 11) c += ' target'; s += '<div class="' + c + '"></div>'; } return s; }

  /* =========================================================
     THE TEN GAMES (ACTIVE + variants)
     ========================================================= */
  section('The ten <span class="gr">games</span>', 'Each obstacle resolver in its ACTIVE state, in the same shell. State is shown as colour and iconography; progress is always a meter; boosts surface only for the committed holder. ARMED and RESOLVE reuse the shell above.');

  /* 1 — CRACK THE TUMBLERS (Tech) */
  TJ.frame(
    { vnum: '05·1', title: 'Crack the Tumblers · ACTIVE', note: 'Tech. Number-cards played in ascending order; the run so far is lit green, the next slot dashed. Progress = pins set. Reset Pin (Lucy) can undo one clash, once.' },
    base({
      roomLabel: 'Room 4 · Tech', crew: crew(['Lucy', 'Chris'], ['George'], ['tec']),
      tp: { text: 'Low to high, no skips, no rush. One pin out of order and the whole board screams.' },
      stage: MG.stage({
        status: [ MG.modeBadge('active'), MG.dial('Tight', 'TEC 5 · 7 pins'), MG.prog('Pins set', '3 / 7', 43) ],
        chal: { live: true, label: 'Challenge · play ascending, a clash trips the alarm', body:
          '<div class="cardrow">' + MG.card('3', 'lit') + MG.card('6', 'lit') + MG.card('9', 'lit') + '<span class="cardplus">\u2192</span>' + MG.card('?', 'next') + MG.card('', 'face-down') + MG.card('', 'face-down') + MG.card('', 'face-down') + '</div>' +
          '<div class="hero-sub">Next card must beat 9 \u00b7 lower trips it</div>' },
        ref: { label: 'Boost', content: MG.boosts([ { holder: 'Lucy', name: 'Reset Pin', lane: 'Tech', state: 'ready' } ]) }
      }),
      action: { back: { label: 'Hold', icon: 'pause', kind: 'ghost' }, cues: [ { icon: 'music', label: 'Tension', cls: 'playing' }, { icon: 'bell', label: 'Alarm' } ], primary: { label: 'Resolve', icon: 'flag', kind: 'primary' } }
    })
  );
  TJ.frame(
    { vnum: '05·1v', title: 'Crack the Tumblers · alarm-tripped', note: 'Variant. A card lower than the run was played — it flags red, the progress meter goes danger, and the alarm cue lights. Reset Pin is still offered (forgive the clash) before this hardens into a Botched.' },
    base({
      roomLabel: 'Room 4 · Tech', crew: crew(['Lucy', 'Chris'], ['George'], ['tec']),
      tp: { amber: true, text: 'A pin drops out of sequence and the board lights up red. Either Lucy resets it now\u2026 or the patrol heard that.' },
      stage: MG.stage({
        status: [ MG.modeBadge('active', 'Active · clash'), MG.dial('Tight', 'TEC 5 · 7 pins'), MG.prog('Clash on pin 4', 'TRIPPED', 57, 'danger') ],
        chal: { label: 'Challenge · alarm tripped', body:
          '<div class="cardrow">' + MG.card('3', 'lit') + MG.card('6', 'lit') + MG.card('9', 'lit') + '<span class="cardplus">\u2192</span>' + MG.card('5', 'bad') + MG.card('', 'face-down') + MG.card('', 'face-down') + MG.card('', 'face-down') + '</div>' +
          '<div class="hero-sub" style="color:var(--c-red-300)">5 is lower than 9 \u2014 clash. Reset Pin forgives it once.</div>' },
        ref: { label: 'Boost', content: MG.boosts([ { holder: 'Lucy', name: 'Reset Pin', lane: 'Tech', state: 'ready' } ]) }
      }),
      action: { back: { label: 'Hold', icon: 'pause', kind: 'ghost' }, cues: [ { icon: 'bell', label: 'Alarm', cls: 'danger' }, { icon: 'music', label: 'Tension', cls: 'playing' } ], secondary: { label: 'Reset Pin', icon: 'rotate-ccw', kind: 'secondary' }, primary: { label: 'Resolve', icon: 'flag', kind: 'danger' } }
    })
  );

  /* 2 — BEAT 16 (Physical) */
  TJ.frame(
    { vnum: '05·2', title: 'Beat 16 · ACTIVE', note: 'Physical. The metronome runs then mutes; the crew counts silently to the target beat (16) and taps. Visible beat pulse along the top, current count as hero, one big TAP. In the Bones (George) re-shows the count once.' },
    base({
      roomLabel: 'Room 5 · Physical', crew: crew(['George', 'Chris'], ['Lucy'], ['phy']),
      tp: { text: 'The beat goes quiet at four. Keep it in your chest, count to sixteen, and slam it on the dot.' },
      stage: MG.stage({
        status: [ MG.modeBadge('active'), MG.dial('Steady', 'PHY 6 · target 16'), MG.prog('Metronome', 'Muted \u00b7 count it', 68, 'data') ],
        chal: { live: true, label: 'Challenge · count to the target beat, then TAP', body:
          '<div class="beatrow">' + dots(16, 12) + '</div>' +
          '<div style="display:flex;align-items:center;gap:34px"><div style="text-align:center"><div class="hero-num" style="font-size:88px">11</div><div class="hero-sub">of 16 · muted</div></div>' +
          '<div class="tapbtn"><span class="tl">TAP</span><span class="ts">On beat 16</span></div></div>' },
        ref: { label: 'Boost', content: MG.boosts([ { holder: 'George', name: 'In the Bones', lane: 'Physical', state: 'ready' } ]) }
      }),
      action: { back: { label: 'Hold', icon: 'pause', kind: 'ghost' }, cues: [ { icon: 'music', label: 'Metronome', cls: 'playing' }, { icon: 'drum', label: 'Hit' } ], primary: { label: 'Resolve', icon: 'flag', kind: 'primary' } }
    })
  );
  TJ.frame(
    { vnum: '05·2v', title: 'Beat 16 · hit / early / late feedback', note: 'Variant. The instant the crew taps, the result reads as a single word in its semantic colour — ON THE BEAT (green) / EARLY (amber) / LATE (red) — over the beat row showing where they landed vs the target.' },
    base({
      roomLabel: 'Room 5 · Physical', crew: crew(['George', 'Chris'], ['Lucy'], ['phy']),
      tp: { text: 'Dead on. Sixteen exactly \u2014 the latch gives with a click you feel more than hear.' },
      stage: MG.stage({
        status: [ MG.modeBadge('active', 'Active · tapped'), MG.dial('Steady', 'PHY 6 · target 16'), MG.prog('Landed on', 'Beat 16 / 16', 100) ],
        chal: { live: true, label: 'Challenge · tap result', body:
          '<div class="beatrow">' + dots(16, 16) + '</div>' +
          '<div class="feedback hit">On the beat</div>' +
          '<div class="hero-sub">Tapped beat 16 \u00b7 0 frames off \u2014 suggest Clean</div>' },
        ref: { label: 'Boost', content: MG.boosts([ { holder: 'George', name: 'In the Bones', lane: 'Physical', state: 'used' } ]) }
      }),
      action: { back: { label: 'Re-tap', icon: 'rotate-ccw', kind: 'ghost' }, cues: [ { icon: 'drum', label: 'Hit', cls: 'playing' } ], primary: { label: 'Resolve · Clean', icon: 'flag', kind: 'primary' } }
    })
  );

  /* 3 — CATEGORIES (Charm) */
  TJ.frame(
    { vnum: '05·3', title: 'Categories · ACTIVE', note: 'Charm. The category large, a prominent tally control and live count, against the count/timer. Timer pressure shown by the clock going amber as it drains. Skip (Millie) drops a dud category once.' },
    base({
      roomLabel: 'Room 4 · Charm', crew: crew(['Millie', 'Lucy'], ['George'], ['cha']),
      tp: { text: 'Keep them coming \u2014 don\u2019t stop to think, just name them. Anything that fits, I\u2019m counting it.' },
      stage: MG.stage({
        status: [ MG.modeBadge('active'), MG.timer('0:12', 'danger', 'Round'), MG.dial('Forgiving', 'CHA 6 · need 8'), MG.prog('Valid answers', '5 / 8', 62, 'warn') ],
        chal: { live: true, label: 'Challenge · read the category, tally each valid answer', body:
          '<div class="hero-word">Things you\u2019d find<br>in a hotel</div>' +
          '<div class="tally"><span class="tcount">5</span><div class="tbtn"><span class="tl">+1</span><span class="ts">Valid answer</span></div></div>' +
          '<div class="hero-sub">Three more before the buzzer for a clean pass</div>' },
        ref: { label: 'Boost', content: MG.boosts([ { holder: 'Millie', name: 'Skip', lane: 'Charm', state: 'ready' } ]) }
      }),
      action: { back: { label: 'Hold', icon: 'pause', kind: 'ghost' }, cues: [ { icon: 'music', label: 'Tension', cls: 'playing' }, { icon: 'timer', label: 'Buzzer', cls: 'danger' } ], primary: { label: 'Resolve', icon: 'flag', kind: 'primary' } }
    })
  );

  /* 4 — THE ONCE-OVER (Stealth) — study + identify */
  TJ.frame(
    { vnum: '05·4a', title: 'The Once-Over · STUDY mode', note: 'Stealth, variant 1. The crew studies the spread for a fixed window — a count-down study timer, all cards face-up, mode badge says STUDY. Nothing is flaggable yet.' },
    base({
      roomLabel: 'Room 3 · Stealth', crew: crew(['Liv', 'Lucy'], ['George'], ['ste']),
      tp: { text: 'Ten seconds. Burn the whole spread into your head \u2014 the cards, the order, the little crooked one on the end. Go.' },
      stage: MG.stage({
        status: [ MG.modeBadge('active', 'Study'), MG.timer('0:07', 'running', 'Study'), MG.dial('Subtle', 'STE 6 · 1 swap'), MG.prog('Memorise', 'Study window', 70, 'data') ],
        chal: { live: true, label: 'Challenge · study the spread (10 cards)', body:
          '<div class="spread">' + ['7','K','2','9','4','J','5','10','3','8'].map(function (v) { return MG.card(v, 'small'); }).join('') + '</div>' +
          '<div class="hero-sub">When the timer ends, the cards flip and one will have changed</div>' },
        ref: { label: 'Boost', content: MG.boosts([ { holder: 'Liv', name: 'Hunch', lane: 'Stealth', state: 'armed' } ]) }
      }),
      action: { back: { label: 'Restart', icon: 'rotate-ccw', kind: 'ghost' }, cues: [ { icon: 'music', label: 'Tension', cls: 'playing' } ], primary: { label: 'To identify', icon: 'chevron-right', kind: 'primary' } }
    })
  );
  TJ.frame(
    { vnum: '05·4b', title: 'The Once-Over · IDENTIFY mode', note: 'Variant 2. The spread returns with one card changed; the crew calls it. The flagged card is shown once for the GM (amber edge). Hunch (Liv) eliminates one wrong card.' },
    base({
      roomLabel: 'Room 3 · Stealth', crew: crew(['Liv', 'Lucy'], ['George'], ['ste']),
      tp: { text: 'Something moved. Look again \u2014 which card isn\u2019t where you left it? Point, don\u2019t guess.' },
      stage: MG.stage({
        status: [ MG.modeBadge('active', 'Identify'), MG.dial('Subtle', 'STE 6 · GM knows'), MG.prog('Call the changed card', '1 guess', 0, 'data') ],
        chal: { live: true, label: 'Challenge · which card changed? (GM sees the answer)', body:
          '<div class="spread">' + [['7',''],['K',''],['2',''],['9',''],['4',''],['J',''],['Q','flag'],['10',''],['3',''],['8','']].map(function (p) { return MG.card(p[0], 'small ' + p[1]); }).join('') + '</div>' +
          '<div class="hero-sub" style="color:var(--c-amber-300)">GM only \u00b7 the 5 became a Q (amber edge)</div>' },
        ref: { label: 'Boost', content: MG.boosts([ { holder: 'Liv', name: 'Hunch', lane: 'Stealth', state: 'ready' } ]) }
      }),
      action: { back: { label: 'Show again', icon: 'eye', kind: 'ghost' }, cues: [ { icon: 'music', label: 'Tension', cls: 'playing' }, { icon: 'check', label: 'Spot' } ], primary: { label: 'Resolve', icon: 'flag', kind: 'primary' } }
    })
  );

  /* 5 — FOLLOW THE CIRCUIT (Tech+Physical) — watching + your-turn */
  TJ.frame(
    { vnum: '05·5a', title: 'Follow the Circuit · WATCHING', note: 'Tech + Physical, variant 1. Simon: a growing sequence plays on the card grid. Live-beat label says which step is lighting (cyan = the app showing), round-length meter fills as the sequence grows. The crew only watches.' },
    base({
      roomLabel: 'Room 5 · Tech+Phys', crew: crew(['Lucy', 'George'], ['Liv'], ['tec', 'phy']),
      tp: { text: 'Watch the panel. Don\u2019t touch anything yet \u2014 just follow the lights and remember the path.' },
      stage: MG.stage({
        status: [ MG.modeBadge('active', 'Watch'), MG.dial('Long', 'TEC+PHY · 6 steps'), MG.prog('Sequence length', 'Step 4 of 6', 66, 'data') ],
        chal: { live: true, label: 'Challenge · watch the sequence grow', body:
          '<div class="simon">' + [0,0,1,0,2,0,0,0,0].map(function (s) { return '<div class="scell' + (s === 1 ? ' data' : '') + '">' + (s === 1 ? '4' : '') + '</div>'; }).join('') + '</div>' +
          '<div class="hero-sub" style="color:var(--c-cyan-300)">Showing step 4 \u00b7 top-centre lights now</div>' },
        ref: { label: 'Boost', content: MG.boosts([ { holder: 'Lucy', name: 'Photographic', lane: 'Tech', state: 'armed' }, { holder: 'George', name: 'Muscle Memory', lane: 'Phys', state: 'armed' } ]) }
      }),
      action: { back: { label: 'Replay', icon: 'rotate-ccw', kind: 'ghost' }, cues: [ { icon: 'music', label: 'Beeps', cls: 'playing' } ], primary: { label: 'Their turn', icon: 'chevron-right', kind: 'primary' } }
    })
  );
  TJ.frame(
    { vnum: '05·5b', title: 'Follow the Circuit · YOUR TURN', note: 'Variant 2. The grid goes neutral and the crew taps the path back; mode badge YOUR TURN (green), progress shows how many they\u2019ve repeated. Photographic / Muscle Memory each replay the sequence once.' },
    base({
      roomLabel: 'Room 5 · Tech+Phys', crew: crew(['Lucy', 'George'], ['Liv'], ['tec', 'phy']),
      tp: { text: 'Now you. Same path, same order \u2014 tap it back and don\u2019t second-guess your hands.' },
      stage: MG.stage({
        status: [ MG.modeBadge('active', 'Your turn'), MG.dial('Long', 'TEC+PHY · 6 steps'), MG.prog('Repeated back', '3 / 6', 50) ],
        chal: { live: true, label: 'Challenge · tap the sequence back', body:
          '<div class="simon">' + [0,1,0,0,0,0,1,0,1].map(function (s) { return '<div class="scell' + (s === 1 ? ' on' : '') + '"></div>'; }).join('') + '</div>' +
          '<div class="hero-sub">3 of 6 correct \u00b7 a wrong tap ends the run</div>' },
        ref: { label: 'Boost', content: MG.boosts([ { holder: 'Lucy', name: 'Photographic', lane: 'Tech', state: 'ready' }, { holder: 'George', name: 'Muscle Memory', lane: 'Phys', state: 'ready' } ]) }
      }),
      action: { back: { label: 'Hold', icon: 'pause', kind: 'ghost' }, cues: [ { icon: 'music', label: 'Beeps', cls: 'playing' } ], primary: { label: 'Resolve', icon: 'flag', kind: 'primary' } }
    })
  );


  TJ.render();
</script>
</body>
</html>
